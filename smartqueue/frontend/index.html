<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartQueue — Intelligent Queue Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #16161f;
      --surface: #1c1c28;
      --surface2: #22223000;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0f0f8;
      --text2: #9090a8;
      --text3: #5a5a72;
      --accent: #6c63ff;
      --accent2: #8b83ff;
      --accent-glow: rgba(108,99,255,0.15);
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.1);
      --amber: #f59e0b;
      --amber-bg: rgba(245,158,11,0.1);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --blue: #3b82f6;
      --blue-bg: rgba(59,130,246,0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 240px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-sub { font-size: 10px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }

    .sidebar-nav { flex: 1; padding: 12px 10px; }

    .nav-section-label {
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 8px 10px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13.5px;
      color: var(--text2);
      transition: all 0.15s;
      margin-bottom: 2px;
    }

    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active { background: var(--accent-glow); color: var(--accent2); }
    .nav-item .nav-icon { font-size: 16px; width: 18px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      font-size: 10px;
      background: var(--accent);
      color: white;
      border-radius: 20px;
      padding: 2px 7px;
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }

    .user-avatar {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
    }

    .user-name { font-size: 13px; font-weight: 500; }
    .user-role { font-size: 11px; color: var(--text3); }

    /* ── MAIN CONTENT ── */
    .main {
      margin-left: 240px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      height: 60px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title { font-size: 15px; font-weight: 600; flex: 1; }
    .topbar-subtitle { font-size: 12px; color: var(--text3); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--green-bg);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--green);
      font-weight: 500;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .topbar-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); }

    /* ── PAGE CONTENT ── */
    .content { padding: 28px; flex: 1; }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: var(--border2); }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.accent::before { background: var(--accent); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.amber::before { background: var(--amber); }
    .stat-card.blue::before { background: var(--blue); }

    .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; }
    .stat-value { font-size: 32px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; margin-bottom: 8px; }
    .stat-card.accent .stat-value { color: var(--accent2); }
    .stat-card.green .stat-value { color: var(--green); }
    .stat-card.amber .stat-value { color: var(--amber); }
    .stat-card.blue .stat-value { color: var(--blue); }

    .stat-change {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text3);
    }

    .stat-change.up { color: var(--green); }
    .stat-change.dn { color: var(--red); }

    /* ── TWO-COL LAYOUT ── */
    .two-col { display: grid; grid-template-columns: 1fr 380px; gap: 20px; margin-bottom: 20px; }
    .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

    /* ── PANELS ── */
    .panel {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    .panel-title { font-size: 14px; font-weight: 600; flex: 1; }
    .panel-action { font-size: 12px; color: var(--accent2); cursor: pointer; }
    .panel-body { padding: 20px; }

    /* ── QUEUE LIVE ── */
    .queue-display {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .queue-current {
      background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(108,99,255,0.05));
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }

    .queue-now-label { font-size: 11px; color: var(--accent2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .queue-token-big { font-size: 56px; font-weight: 800; color: var(--accent2); letter-spacing: -3px; line-height: 1; font-family: 'JetBrains Mono', monospace; }
    .queue-name-big { font-size: 13px; color: var(--text2); margin-top: 6px; }

    .queue-up-next { font-size: 12px; color: var(--text3); margin-top: 12px; }
    .queue-up-tokens { display: flex; gap: 8px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }

    .token-chip {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      color: var(--text2);
    }

    .token-chip.called { background: var(--accent-glow); border-color: rgba(108,99,255,0.3); color: var(--accent2); }

    /* ── QUEUE ITEMS ── */
    .queue-list { display: flex; flex-direction: column; gap: 8px; }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: all 0.2s;
      cursor: pointer;
    }

    .queue-item:hover { border-color: var(--border2); background: var(--surface); }
    .queue-item.active { border-color: rgba(108,99,255,0.4); background: var(--accent-glow); }
    .queue-item.done { opacity: 0.45; }

    .q-pos {
      width: 28px;
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
    }

    .q-token {
      width: 48px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent2);
    }

    .q-info { flex: 1; }
    .q-name { font-size: 13px; font-weight: 500; }
    .q-service { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .q-wait {
      font-size: 12px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }

    .q-status {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text3);
    }

    .q-status.waiting { background: var(--amber); }
    .q-status.serving { background: var(--green); animation: pulse 1.5s infinite; }
    .q-status.done { background: var(--text3); }

    /* ── COUNTERS ── */
    .counter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

    .counter-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      text-align: center;
      transition: all 0.2s;
    }

    .counter-card.serving { border-color: rgba(34,197,94,0.3); background: var(--green-bg); }
    .counter-card.idle { border-color: var(--border); }

    .counter-num { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
    .counter-token {
      font-size: 20px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--green);
      margin-bottom: 4px;
    }
    .counter-card.idle .counter-token { color: var(--text3); }
    .counter-serving { font-size: 11px; color: var(--text2); }

    /* ── CHART BARS ── */
    .chart-wrap { padding: 0 20px 20px; }
    .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 120px; }
    .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .chart-bar {
      width: 100%;
      background: var(--accent);
      border-radius: 4px 4px 0 0;
      opacity: 0.7;
      transition: opacity 0.2s;
      min-height: 4px;
    }
    .chart-bar:hover { opacity: 1; }
    .chart-bar.current { opacity: 1; }
    .chart-label { font-size: 10px; color: var(--text3); }
    .chart-footer { display: flex; justify-content: space-between; padding: 10px 0 0; }
    .chart-legend { display: flex; gap: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    /* ── BOOK TOKEN FORM ── */
    .book-form { display: flex; flex-direction: column; gap: 14px; }

    .form-field label {
      display: block;
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .form-field input,
    .form-field select {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-field input:focus,
    .form-field select:focus { border-color: var(--accent); }

    .form-field select option { background: var(--bg3); }

    .book-btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      letter-spacing: 0.2px;
    }

    .book-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .book-btn:active { transform: translateY(0); }

    /* ── TOKEN ISSUED ── */
    .token-issued {
      background: var(--green-bg);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: var(--radius-sm);
      padding: 14px;
      text-align: center;
      display: none;
    }

    .token-issued.show { display: block; }
    .token-issued-label { font-size: 11px; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .token-issued-num { font-size: 28px; font-weight: 800; color: var(--green); font-family: 'JetBrains Mono', monospace; }
    .token-issued-wait { font-size: 12px; color: var(--text2); margin-top: 4px; }

    /* ── ACTIVITY LOG ── */
    .activity-list { display: flex; flex-direction: column; }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .activity-item:last-child { border-bottom: none; }

    .activity-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .activity-content { flex: 1; }
    .activity-text { font-size: 13px; color: var(--text); }
    .activity-text span { color: var(--accent2); font-weight: 500; }
    .activity-time { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }

    /* ── TAGS ── */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .tag-green { background: var(--green-bg); color: var(--green); }
    .tag-amber { background: var(--amber-bg); color: var(--amber); }
    .tag-red { background: var(--red-bg); color: var(--red); }
    .tag-blue { background: var(--blue-bg); color: var(--blue); }
    .tag-accent { background: var(--accent-glow); color: var(--accent2); }

    /* ── WAIT TIME RING ── */
    .wait-ring-wrap { display: flex; align-items: center; justify-content: center; padding: 16px 0; }
    .wait-ring { position: relative; width: 100px; height: 100px; }
    .wait-ring svg { transform: rotate(-90deg); }
    .wait-ring-label {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .wait-ring-num { font-size: 22px; font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace; }
    .wait-ring-unit { font-size: 10px; color: var(--text3); }

    /* ── PRIORITY BADGE ── */
    .priority-wrap { display: flex; gap: 8px; }
    .priority-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      color: var(--text2);
      transition: all 0.15s;
      background: transparent;
      font-family: 'Inter', sans-serif;
    }
    .priority-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .priority-btn.selected { border-color: var(--accent); background: var(--accent-glow); color: var(--accent2); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 13px;
      color: var(--text);
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-title { font-weight: 600; margin-bottom: 3px; }
    .toast-body { color: var(--text2); font-size: 12px; }

    /* ── ADMIN CONTROLS ── */
    .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .admin-btn {
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .admin-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .admin-btn.call { border-color: rgba(108,99,255,0.4); color: var(--accent2); }
    .admin-btn.call:hover { background: var(--accent-glow); }
    .admin-btn.skip { border-color: rgba(245,158,11,0.4); color: var(--amber); }
    .admin-btn.skip:hover { background: var(--amber-bg); }
    .admin-btn.close { border-color: rgba(239,68,68,0.4); color: var(--red); }
    .admin-btn.close:hover { background: var(--red-bg); }

    .section-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">SmartQueue</div>
        <div class="logo-sub">Queue Manager</div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <div class="nav-item active" onclick="switchTab('dashboard')">
      <span class="nav-icon">◈</span> Dashboard
    </div>
    <div class="nav-item" onclick="switchTab('queue')">
      <span class="nav-icon">≡</span> Live Queue
      <span class="nav-badge" id="live-count">7</span>
    </div>
    <div class="nav-item" onclick="switchTab('book')">
      <span class="nav-icon">＋</span> Book Token
    </div>

    <div class="nav-section-label" style="margin-top:16px;">Manage</div>
    <div class="nav-item" onclick="switchTab('counters')">
      <span class="nav-icon">▦</span> Counters
    </div>
    <div class="nav-item" onclick="switchTab('analytics')">
      <span class="nav-icon">↗</span> Analytics
    </div>
    <div class="nav-item" onclick="switchTab('history')">
      <span class="nav-icon">◷</span> History
    </div>

    <div class="nav-section-label" style="margin-top:16px;">Config</div>
    <div class="nav-item">
      <span class="nav-icon">⚙</span> Settings
    </div>
    <div class="nav-item">
      <span class="nav-icon">🔔</span> Notifications
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar">AD</div>
      <div>
        <div class="user-name">Admin</div>
        <div class="user-role">Super Admin</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div class="topbar-title" id="page-title">Dashboard Overview</div>
      <div class="topbar-subtitle" id="page-subtitle">Monday, 29 June 2026 · General OPD Wing</div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      Live
    </div>
    <button class="topbar-btn btn-ghost" onclick="simulateTick()">⟳ Refresh</button>
    <button class="topbar-btn btn-primary" onclick="switchTab('book')">＋ New Token</button>
  </div>

  <!-- CONTENT -->
  <div class="content" id="app-content">
    <!-- Injected by JS -->
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-title" id="toast-title"></div>
  <div class="toast-body" id="toast-body"></div>
</div>

<script>
  // ── STATE ──
  const state = {
    currentTab: 'dashboard',
    tokenCounter: 42,
    queue: [
      { token: 'A-038', name: 'Rajesh Kumar', service: 'General Consultation', wait: 0, status: 'serving', priority: 'normal' },
      { token: 'A-039', name: 'Priya Sharma', service: 'Blood Test', wait: 8, status: 'waiting', priority: 'normal' },
      { token: 'A-040', name: 'Mohammed Ali', service: 'X-Ray', wait: 16, status: 'waiting', priority: 'urgent' },
      { token: 'A-041', name: 'Sunita Devi', service: 'General Consultation', wait: 24, status: 'waiting', priority: 'normal' },
      { token: 'A-042', name: 'Arjun Nair', service: 'Pharmacy', wait: 32, status: 'waiting', priority: 'normal' },
      { token: 'A-043', name: 'Deepa Patel', service: 'Blood Test', wait: 40, status: 'waiting', priority: 'senior' },
      { token: 'A-044', name: 'Vikram Singh', service: 'General Consultation', wait: 48, status: 'waiting', priority: 'normal' },
    ],
    counters: [
      { id: 1, serving: 'A-038', name: 'Dr. Mehta', active: true },
      { id: 2, serving: 'A-035', name: 'Dr. Rao', active: true },
      { id: 3, serving: null, name: 'Dr. Joshi', active: false },
    ],
    stats: { served: 37, waiting: 7, avgWait: 14, satisfaction: 94 },
    hourlyData: [12, 18, 28, 35, 42, 38, 30, 22, 19, 25, 33, 28],
    activity: [
      { text: 'Token <span>A-037</span> served at Counter 2', time: '2 min ago', color: '#22c55e' },
      { text: 'Token <span>A-040</span> marked as urgent', time: '5 min ago', color: '#f59e0b' },
      { text: '<span>Counter 3</span> went offline — Dr. Joshi break', time: '11 min ago', color: '#ef4444' },
      { text: 'Token <span>A-033</span> no-show, skipped', time: '18 min ago', color: '#5a5a72' },
      { text: 'Token <span>A-032</span> served at Counter 1', time: '21 min ago', color: '#22c55e' },
    ]
  };

  // ── TOAST ──
  function showToast(title, body) {
    const t = document.getElementById('toast');
    document.getElementById('toast-title').textContent = title;
    document.getElementById('toast-body').textContent = body;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ── NAVIGATION ──
  function switchTab(tab) {
    state.currentTab = tab;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event?.target?.closest('.nav-item')?.classList.add('active');
    render();
  }

  // ── RENDER ──
  function render() {
    const content = document.getElementById('app-content');
    switch (state.currentTab) {
      case 'dashboard': renderDashboard(content); break;
      case 'queue': renderQueue(content); break;
      case 'book': renderBook(content); break;
      case 'counters': renderCounters(content); break;
      case 'analytics': renderAnalytics(content); break;
      case 'history': renderHistory(content); break;
      default: renderDashboard(content);
    }
  }

  // ── DASHBOARD ──
  function renderDashboard(el) {
    document.getElementById('page-title').textContent = 'Dashboard Overview';
    const hours = ['9am','10am','11am','12pm','1pm','2pm','3pm','4pm','5pm','6pm','7pm','Now'];
    const maxH = Math.max(...state.hourlyData);

    el.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card accent">
          <div class="stat-label">Tokens Waiting</div>
          <div class="stat-value">${state.stats.waiting}</div>
          <div class="stat-change up">▲ 2 since last hour</div>
        </div>
        <div class="stat-card green">
          <div class="stat-label">Served Today</div>
          <div class="stat-value">${state.stats.served}</div>
          <div class="stat-change up">▲ 12% vs yesterday</div>
        </div>
        <div class="stat-card amber">
          <div class="stat-label">Avg Wait (min)</div>
          <div class="stat-value">${state.stats.avgWait}</div>
          <div class="stat-change dn">▼ 3 min improvement</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-label">Satisfaction</div>
          <div class="stat-value">${state.stats.satisfaction}%</div>
          <div class="stat-change up">▲ High today</div>
        </div>
      </div>

      <div class="two-col">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Hourly Token Volume</div>
            <div class="tag tag-green">Peak: 11am</div>
          </div>
          <div class="chart-wrap" style="padding-top:20px;">
            <div class="chart-bars">
              ${state.hourlyData.map((v,i) => `
                <div class="chart-bar-wrap">
                  <div class="chart-bar ${i===11?'current':''}" style="height:${Math.round((v/maxH)*100)}px;" title="${v} tokens"></div>
                  <div class="chart-label">${hours[i]}</div>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="panel-header" style="border-top:1px solid var(--border);border-bottom:none;padding-top:14px;">
            <div class="chart-legend">
              <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Tokens/hour</div>
              <div class="legend-item"><div class="legend-dot" style="background:rgba(108,99,255,1)"></div> Current</div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Now Serving</div>
            <span class="tag tag-green">3 active</span>
          </div>
          <div class="panel-body">
            <div class="queue-current">
              <div class="queue-now-label">Counter 1 · Dr. Mehta</div>
              <div class="queue-token-big">${state.queue[0].token}</div>
              <div class="queue-name-big">${state.queue[0].name}</div>
            </div>
            <div style="margin-top:14px;">
              <div class="section-label">Up next</div>
              <div class="queue-up-tokens">
                ${state.queue.slice(1,5).map(q => `<div class="token-chip">${q.token}</div>`).join('')}
              </div>
            </div>
            <div style="margin-top:16px;">
              <div class="admin-actions">
                <button class="admin-btn call" onclick="callNext()">▶ Call Next</button>
                <button class="admin-btn skip" onclick="skipToken()">⇥ Skip</button>
                <button class="admin-btn close" onclick="closeToken()">✓ Done</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="two-col">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Live Queue</div>
            <span class="panel-action" onclick="switchTab('queue')">View all →</span>
          </div>
          <div class="panel-body" style="padding-top:0;">
            <div class="queue-list">
              ${state.queue.slice(0,5).map((q,i) => `
                <div class="queue-item ${q.status==='serving'?'active':''}">
                  <div class="q-pos">${String(i+1).padStart(2,'0')}</div>
                  <div class="q-token">${q.token}</div>
                  <div class="q-info">
                    <div class="q-name">${q.name}</div>
                    <div class="q-service">${q.service}</div>
                  </div>
                  ${q.priority==='urgent'?'<span class="tag tag-red">Urgent</span>':q.priority==='senior'?'<span class="tag tag-amber">Senior</span>':''}
                  <div class="q-wait">${q.wait===0?'Now':`${q.wait}m`}</div>
                  <div class="q-status ${q.status}"></div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Recent Activity</div>
          </div>
          <div class="panel-body" style="padding-top:4px;">
            <div class="activity-list">
              ${state.activity.map(a => `
                <div class="activity-item">
                  <div class="activity-dot" style="background:${a.color}"></div>
                  <div class="activity-content">
                    <div class="activity-text">${a.text}</div>
                    <div class="activity-time">${a.time}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  // ── QUEUE ──
  function renderQueue(el) {
    document.getElementById('page-title').textContent = 'Live Queue';
    el.innerHTML = `
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">All Active Tokens</div>
          <span class="tag tag-accent">${state.queue.length} in queue</span>
        </div>
        <div class="panel-body">
          <div class="queue-list">
            ${state.queue.map((q,i) => `
              <div class="queue-item ${q.status==='serving'?'active':''}">
                <div class="q-pos">${String(i+1).padStart(2,'0')}</div>
                <div class="q-token">${q.token}</div>
                <div class="q-info">
                  <div class="q-name">${q.name}</div>
                  <div class="q-service">${q.service}</div>
                </div>
                ${q.priority==='urgent'?'<span class="tag tag-red">Urgent</span>':q.priority==='senior'?'<span class="tag tag-amber">Senior</span>':'<span class="tag" style="background:transparent;color:var(--text3)">Normal</span>'}
                <div class="q-wait">${q.wait===0?'Now':`${q.wait}m`}</div>
                <div class="q-status ${q.status}"></div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  // ── BOOK TOKEN ──
  function renderBook(el) {
    document.getElementById('page-title').textContent = 'Book a Token';
    el.innerHTML = `
      <div style="max-width: 520px; margin: 0 auto;">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">New Token Request</div>
            <span class="tag tag-green">~14 min avg wait</span>
          </div>
          <div class="panel-body">
            <div class="book-form">
              <div class="form-field">
                <label>Full Name</label>
                <input type="text" id="f-name" placeholder="e.g. Pratik Senapati" />
              </div>
              <div class="form-field">
                <label>Mobile Number</label>
                <input type="tel" id="f-phone" placeholder="e.g. 9079670970" />
              </div>
              <div class="form-field">
                <label>Service Required</label>
                <select id="f-service">
                  <option value="">Select service</option>
                  <option>General Consultation</option>
                  <option>Blood Test</option>
                  <option>X-Ray / Imaging</option>
                  <option>Pharmacy</option>
                  <option>Emergency</option>
                </select>
              </div>
              <div class="form-field">
                <label>Priority</label>
                <div class="priority-wrap">
                  <button class="priority-btn selected" id="p-normal" onclick="selectPriority('normal')">Normal</button>
                  <button class="priority-btn" id="p-senior" onclick="selectPriority('senior')">Senior / Disabled</button>
                  <button class="priority-btn" id="p-urgent" onclick="selectPriority('urgent')">Urgent</button>
                </div>
              </div>
              <div class="token-issued" id="issued-box">
                <div class="token-issued-label">Token Issued</div>
                <div class="token-issued-num" id="issued-num">A-000</div>
                <div class="token-issued-wait" id="issued-wait">Estimated wait: 0 minutes</div>
              </div>
              <button class="book-btn" onclick="bookToken()">Generate Token</button>
            </div>
          </div>
        </div>

        <div class="panel" style="margin-top:16px;">
          <div class="panel-header"><div class="panel-title">Current Wait Times by Service</div></div>
          <div class="panel-body">
            ${[['General Consultation','18 min','var(--amber)'],['Blood Test','8 min','var(--green)'],['X-Ray / Imaging','25 min','var(--red)'],['Pharmacy','5 min','var(--green)']].map(([s,t,c]) => `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
                <span style="font-size:13px">${s}</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:${c}">${t}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
    window._selectedPriority = 'normal';
  }

  function selectPriority(p) {
    window._selectedPriority = p;
    ['normal','senior','urgent'].forEach(x => document.getElementById(`p-${x}`)?.classList.remove('selected'));
    document.getElementById(`p-${p}`)?.classList.add('selected');
  }

  function bookToken() {
    const name = document.getElementById('f-name')?.value;
    const phone = document.getElementById('f-phone')?.value;
    const service = document.getElementById('f-service')?.value;
    if (!name || !phone || !service) { showToast('Missing fields', 'Please fill in all required fields.'); return; }
    state.tokenCounter++;
    const token = `A-0${state.tokenCounter}`;
    const wait = state.queue.length * 8;
    state.queue.push({ token, name, service, wait, status: 'waiting', priority: window._selectedPriority || 'normal' });
    state.stats.waiting++;
    document.getElementById('live-count').textContent = state.stats.waiting;
    document.getElementById('issued-num').textContent = token;
    document.getElementById('issued-wait').textContent = `Estimated wait: ~${wait} minutes`;
    document.getElementById('issued-box').classList.add('show');
    showToast(`Token ${token} issued!`, `${name} · ${service} · ~${wait} min wait`);
  }

  // ── COUNTERS ──
  function renderCounters(el) {
    document.getElementById('page-title').textContent = 'Counter Management';
    el.innerHTML = `
      <div class="three-col" style="margin-bottom:20px;">
        ${state.counters.map(c => `
          <div class="panel counter-card ${c.active?'serving':'idle'}">
            <div class="panel-header">
              <div class="panel-title">Counter ${c.id}</div>
              <span class="tag ${c.active?'tag-green':'tag-accent'}">${c.active?'Active':'Idle'}</span>
            </div>
            <div class="panel-body" style="text-align:center;">
              <div class="counter-num">Currently serving</div>
              <div class="counter-token">${c.serving || '—'}</div>
              <div class="counter-serving">${c.name}</div>
              <div style="margin-top:14px;" class="admin-actions" style="justify-content:center;">
                <button class="admin-btn call" onclick="callNext()">▶ Call Next</button>
                <button class="admin-btn ${c.active?'close':'call'}" onclick="toggleCounter(${c.id})">${c.active?'Pause':'Resume'}</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Counter Performance Today</div></div>
        <div class="panel-body">
          ${state.counters.map((c,i) => `
            <div style="display:flex;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid var(--border);">
              <div style="font-size:13px;font-weight:500;width:90px;">Counter ${c.id}</div>
              <div style="flex:1;background:var(--bg2);border-radius:4px;height:6px;overflow:hidden;">
                <div style="height:100%;width:${[78,65,42][i]}%;background:var(--accent);border-radius:4px;"></div>
              </div>
              <div style="font-size:12px;color:var(--text2);width:60px;text-align:right;">${[22,18,11][i]} served</div>
              <span class="tag ${c.active?'tag-green':'tag-accent'}">${c.active?'Online':'Offline'}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  function toggleCounter(id) {
    const c = state.counters.find(x => x.id === id);
    if (c) { c.active = !c.active; renderCounters(document.getElementById('app-content')); showToast(`Counter ${id} ${c.active?'resumed':'paused'}`, ''); }
  }

  // ── ANALYTICS ──
  function renderAnalytics(el) {
    document.getElementById('page-title').textContent = 'Analytics';
    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const weekly = [85, 92, 78, 110, 95, 60, 40];
    const maxW = Math.max(...weekly);
    el.innerHTML = `
      <div class="stats-grid" style="margin-bottom:20px;">
        <div class="stat-card green"><div class="stat-label">This Week</div><div class="stat-value">560</div><div class="stat-change up">▲ 8% vs last week</div></div>
        <div class="stat-card accent"><div class="stat-label">Peak Hour</div><div class="stat-value">11am</div><div class="stat-change">42 tokens in 1hr</div></div>
        <div class="stat-card amber"><div class="stat-label">Avg Service Time</div><div class="stat-value">7.2m</div><div class="stat-change dn">▼ 0.8m improvement</div></div>
        <div class="stat-card blue"><div class="stat-label">No-Shows</div><div class="stat-value">4.1%</div><div class="stat-change">12 this week</div></div>
      </div>
      <div class="two-col">
        <div class="panel">
          <div class="panel-header"><div class="panel-title">Weekly Token Volume</div></div>
          <div class="chart-wrap" style="padding-top:20px;">
            <div class="chart-bars" style="height:140px;">
              ${weekly.map((v,i) => `
                <div class="chart-bar-wrap">
                  <div class="chart-bar ${i===4?'current':''}" style="height:${Math.round((v/maxW)*130)}px;"></div>
                  <div class="chart-label">${days[i]}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header"><div class="panel-title">Service Distribution</div></div>
          <div class="panel-body">
            ${[['General Consultation',48,'var(--accent)'],['Blood Test',22,'var(--green)'],['X-Ray',15,'var(--amber)'],['Pharmacy',15,'var(--blue)']].map(([s,p,c]) => `
              <div style="margin-bottom:14px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;">
                  <span>${s}</span><span style="color:var(--text3)">${p}%</span>
                </div>
                <div style="background:var(--bg2);border-radius:4px;height:6px;overflow:hidden;">
                  <div style="height:100%;width:${p}%;background:${c};border-radius:4px;transition:width 0.5s;"></div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  // ── HISTORY ──
  function renderHistory(el) {
    document.getElementById('page-title').textContent = 'Token History';
    const past = [
      { token:'A-037', name:'Kavya Iyer', service:'General Consultation', wait:12, counter:2, time:'2:34 PM', status:'done' },
      { token:'A-036', name:'Ravi Bhat', service:'Pharmacy', wait:5, counter:1, time:'2:28 PM', status:'done' },
      { token:'A-035', name:'Neha Singh', service:'Blood Test', wait:8, counter:2, time:'2:19 PM', status:'done' },
      { token:'A-034', name:'Ankit Jha', service:'X-Ray', wait:22, counter:1, time:'2:10 PM', status:'done' },
      { token:'A-033', name:'Pooja Mishra', service:'General Consultation', wait:0, counter:0, time:'2:02 PM', status:'noshow' },
    ];
    el.innerHTML = `
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Today's Completed Tokens</div>
          <span class="tag tag-green">37 served</span>
        </div>
        <div class="panel-body">
          <div class="queue-list">
            ${past.map(q => `
              <div class="queue-item done">
                <div class="q-token" style="color:var(--text3)">${q.token}</div>
                <div class="q-info">
                  <div class="q-name">${q.name}</div>
                  <div class="q-service">${q.service} · Counter ${q.counter||'—'}</div>
                </div>
                <div class="q-wait" style="color:var(--text3)">${q.wait ? q.wait+'m wait' : '—'}</div>
                <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">${q.time}</div>
                <span class="tag ${q.status==='done'?'tag-green':'tag-red'}">${q.status==='done'?'Served':'No-show'}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  // ── ADMIN ACTIONS ──
  function callNext() {
    if (state.queue.length > 1) {
      state.queue[0].status = 'done';
      state.queue.shift();
      state.queue[0].status = 'serving';
      state.queue[0].wait = 0;
      state.queue.forEach((q,i) => { if(i>0) q.wait = i*8; });
      state.stats.served++;
      state.stats.waiting = state.queue.length;
      document.getElementById('live-count').textContent = state.stats.waiting;
      showToast(`Now calling ${state.queue[0].token}`, `${state.queue[0].name} · ${state.queue[0].service}`);
      render();
    }
  }

  function skipToken() {
    if (state.queue.length > 1) {
      const skipped = state.queue.splice(0,1)[0];
      state.queue.push({...skipped, wait: state.queue.length*8, status:'waiting'});
      showToast('Token skipped', `${skipped.token} moved to end of queue`);
      render();
    }
  }

  function closeToken() {
    if (state.queue.length > 0) {
      const done = state.queue.shift();
      state.stats.served++;
      state.stats.waiting = state.queue.length;
      if(state.queue.length > 0) state.queue[0].status = 'serving';
      document.getElementById('live-count').textContent = state.stats.waiting;
      showToast('Token closed ✓', `${done.token} marked as served`);
      render();
    }
  }

  // ── SIMULATE LIVE ──
  function simulateTick() {
    state.stats.avgWait = Math.max(8, state.stats.avgWait + (Math.random() > 0.5 ? 1 : -1));
    showToast('Refreshed', 'Queue data updated in real time');
    render();
  }

  // Auto-refresh every 30s
  setInterval(() => {
    state.hourlyData[11] = Math.min(50, state.hourlyData[11] + Math.floor(Math.random()*3));
  }, 30000);

  // ── INIT ──
  render();
</script>
</body>
</html>
