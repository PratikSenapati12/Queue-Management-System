# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database (PostgreSQL) ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/smartqueue
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Redis (for caching queue state) ─────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ── Logging ─────────────────────────────────────────────────────────────────────
logging.level.com.smartqueue=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.websocket=INFO

# ── Actuator (health check for Docker) ──────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── App metadata ─────────────────────────────────────────────────────────────────
spring.application.name=SmartQueue
info.app.version=1.0.0
info.app.description=Intelligent Queue Management System
